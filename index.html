<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医学生保研面试模拟器 - 不发正刊不改名</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --accent: #27ae60; --bg: #f8fafc; --danger: #e74c3c; }
        body { font-family: 'PingFang SC', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--primary); }
        .container { max-width: 900px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.8rem; margin-bottom: 8px; color: #1a202c; }
        .subtitle { color: #64748b; font-size: 0.95rem; }

        /* 主页卡片 */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s; border-left: 5px solid var(--secondary); display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .card.random-card { border-left-color: var(--accent); background: #f0fdf4; grid-column: span 2; color: var(--accent); }

        /* 视图控制 */
        #question-view, #practice-view { display: none; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #edf2f7; }
        
        /* 列表项 */
        .q-item { padding: 15px; border-bottom: 1px solid #f1f5f9; display: flex; flex-direction: column; gap: 10px; }
        .q-text { font-size: 1rem; color: #334155; line-height: 1.5; font-weight: 500; }
        .controls-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; background: #f8fafc; padding: 8px; border-radius: 8px; }
        
        /* 按钮样式 */
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
        .btn-back { background: #f1f5f9; color: #475569; }
        .play-btn { background: var(--secondary); color: white; display: flex; align-items: center; gap: 5px; }
        
        /* 设置组件 */
        .setting-group { display: flex; align-items: center; gap: 5px; font-size: 0.8rem; color: #64748b; }
        select, input[type="range"] { padding: 2px; border-radius: 4px; border: 1px solid #cbd5e0; }

        /* 抽题模式 */
        .practice-box { text-align: center; padding: 40px 10px; }
        #hidden-q { font-size: 1.4rem; min-height: 100px; margin: 20px 0; display: flex; align-items: center; justify-content: center; border: 2px dashed #e2e8f0; border-radius: 12px; padding: 20px; color: #94a3b8; }
        .reveal-active { color: var(--danger) !important; border-style: solid !important; border-color: #fee2e2 !important; background: #fef2f2; }

        footer { margin-top: auto; padding: 30px 0; text-align: center; color: #94a3b8; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="container">
    <header id="main-header">
        <h1>🩺 医学生保研面试模拟器</h1>
        <p class="subtitle">不发正刊不改名（全平台同名）原创</p>
    </header>

    <div id="home-view" class="grid">
        <div class="card" onclick="showCategory(0)">1. 自我介绍与周围环境</div>
        <div class="card" onclick="showCategory(1)">2. 本科阶段经历</div>
        <div class="card" onclick="showCategory(2)">3. 选择动机和未来规划</div>
        <div class="card" onclick="showCategory(3)">4. 心理素质与人际关系</div>
        <div class="card random-card" onclick="enterPracticeMode(true)">🎲 进入随机抽题模式</div>
    </div>

    <div id="question-view">
        <div class="nav-header">
            <button class="btn btn-back" onclick="goHome()">← 返回主页</button>
            <strong id="cat-title"></strong>
            <span></span>
        </div>
        <div id="q-list"></div>
    </div>

    <div id="practice-view">
        <div class="nav-header">
            <button class="btn btn-back" onclick="goHome()">← 返回主页</button>
            <strong>随机抽题模式</strong>
            <span></span>
        </div>
        <div class="practice-box">
            <button class="btn" onclick="pickRandom()" style="background:var(--accent); color:white; padding:15px 30px; font-size:1.1rem; border-radius:50px;">🎲 随机抽取一题</button>
            <div id="hidden-q">点击上方按钮开始</div>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button class="btn" onclick="toggleReveal()" style="background:#64748b; color:white;">显示/隐藏文字</button>
                <button class="btn" onclick="replay()" style="background:var(--secondary); color:white;">🔄 重播</button>
            </div>
            <div class="controls-row" style="margin-top:20px; justify-content:center;">
                <div class="setting-group">
                    🗣️ 口音: <select id="global-voice"></select>
                </div>
                <div class="setting-group">
                    ⚡ 语速: <input type="range" class="speed-slider" min="0.5" max="1.2" step="0.1" value="0.8">
                </div>
            </div>
        </div>
    </div>

    <footer>
        免责声明：本工具是基于开源技术开发的练习工具，随配套文件赠送，仅供模拟练习。
    </footer>
</div>

<script>
const data = [
    { title: "自我介绍与周围环境", questions: [
        "Introduce yourself. What kind of person do you think you are? Describe yourself with three words.",
        "Introduce your family.", "Introduce your best friend.", "Introduce your hometown.",
        "Do you have a girl/boy friend？Are you in a relationship?",
        "Have you ever traveled to any place? Please introduce a tourist attraction / favorite city.",
        "What’s your hobby? What are your hobbies and interests? What do you like to do in your free time? Do you have any hobbies?",
        "What’s your favorite sport/athlete/movie/book?",
        "What are your strengths and weaknesses? What are your advantages and disadvantages? What are you good at, and where you’re working on improving?",
        "What is your English name and why did you choose it?",
        "How do your hobbies help you in your medical studies?"
    ]},
    { title: "本科阶段经历", questions: [
        "Introduce your undergraduate school.", "Introduce the student club you joined in.",
        "What do you usually do on weekends? How do you spend your time at school on a daily basis? How was your typical day at school?",
        "How do you balance your studies and research?", "What skills did you acquire in college?",
        "What's your favorite subject? Why?", "How many people are there in your major?",
        "How do you learn English? / What's your attitude towards learning English? / How did you improve your spoken English?",
        "Which course was the most difficult for you, and how did you pass it?",
        "If you could restart your undergraduate life, what would you do differently?",
        "Introduce your scientific experience. What competition/project did you participate in? Introduce the research project you conducted during your undergraduate studies.",
        "What's the relationship between practice and science?", "What do you think is the most important quality for a medical post-graduate?",
        "What is the significance/innovation of your research project?",
        "Have you been to the laboratory? How long do you usually stay in the laboratory? How much time do you spend on experiments each week?",
        "How often do you read papers? How do you read papers?",
        "Which topic/area/field are you particularly interested in?",
        "Introduce the social practice project / volunteer experiences you have joined.",
        "Do you have any experience studying abroad?"
    ]},
    { title: "选择动机和未来规划", questions: [
        "Why do you want to be a doctor? Why do you choose this major?",
        "Why do you choose the academic or professional degree?",
        "What are your long-term and short-term goals? / Talk about your dreams. / Talk about your plans for your postgraduate studies."
    ]},
    { title: "心理素质与人际关系", questions: [
        "How do you deal with negative emotions, like stress and anxiety / setbacks? How do you relieve stress?",
        "How do you handle the failure of an experiment?",
        "Talk about the most successful experience. What do you consider to be your greatest achievement during your undergraduate years?",
        "As the team leader, how do you manage the team?", "Tell me about your teamwork experience.",
        "How do your friends talk about you?",
        "If you have an argument with someone, how do you resolve it? Describe a situation where you had to work with a difficult teammate.",
        "Can you handle many tasks at the same time?", "Do you think you are an emotionally stable person?",
        "Do you prefer to work alone or together?"
    ]}
];

let synth = window.speechSynthesis;
let currentQ = "";
let isRevealed = false;

function loadVoices(selectId) {
    const select = document.getElementById(selectId);
    const voices = synth.getVoices();
    // 过滤出英文及常见的中文人声（中文人声读英语通常有中式口音）
    const filtered = voices.filter(v => v.lang.includes('en') || v.lang.includes('zh'));
    select.innerHTML = filtered.map(v => `<option value="${v.name}">${v.name}</option>`).join('');
}

window.speechSynthesis.onvoiceschanged = () => {
    loadVoices('global-voice');
};

function showCategory(idx) {
    document.getElementById('home-view').style.display = 'none';
    document.getElementById('question-view').style.display = 'block';
    document.getElementById('cat-title').innerText = data[idx].title;
    
    const list = document.getElementById('q-list');
    list.innerHTML = data[idx].questions.map((q, i) => `
        <div class="q-item">
            <div class="q-text">${q}</div>
            <div class="controls-row">
                <button class="btn play-btn" onclick="playQuestion(this, '${q.replace(/'/g, "\\'")}')">▶ 播放</button>
                <div class="setting-group">
                    🗣️: <select class="voice-sel" id="vs-${idx}-${i}"></select>
                </div>
                <div class="setting-group">
                    ⚡: <input type="range" class="speed-slider" min="0.5" max="1.2" step="0.1" value="0.8">
                </div>
            </div>
        </div>
    `).join('');
    
    // 为当前页面的所有下拉框加载配音
    data[idx].questions.forEach((_, i) => loadVoices(`vs-${idx}-${i}`));
}

function playQuestion(btn, text) {
    synth.cancel();
    const row = btn.parentElement;
    const voiceName = row.querySelector('select').value;
    const speed = row.querySelector('input').value;
    
    const utter = new SpeechSynthesisUtterance(text);
    utter.voice = synth.getVoices().find(v => v.name === voiceName);
    utter.rate = speed;
    synth.speak(utter);
}

function goHome() {
    document.getElementById('home-view').style.display = 'grid';
    document.getElementById('question-view').style.display = 'none';
    document.getElementById('practice-view').style.display = 'none';
}

function enterPracticeMode() {
    document.getElementById('home-view').style.display = 'none';
    document.getElementById('practice-view').style.display = 'block';
    currentQ = "";
    isRevealed = false;
    document.getElementById('hidden-q').innerText = "点击上方按钮开始";
    document.getElementById('hidden-q').classList.remove('reveal-active');
    loadVoices('global-voice');
}

function pickRandom() {
    const allQs = data.flatMap(d => d.questions);
    currentQ = allQs[Math.floor(Math.random() * allQs.length)];
    isRevealed = false;
    const box = document.getElementById('hidden-q');
    box.innerText = "题目已隐藏，请注意听...";
    box.classList.remove('reveal-active');
    
    // 自动播放
    replay();
}

function replay() {
    if (!currentQ) return;
    synth.cancel();
    const voiceName = document.getElementById('global-voice').value;
    const speed = document.querySelector('#practice-view .speed-slider').value;
    
    const utter = new SpeechSynthesisUtterance(currentQ);
    utter.voice = synth.getVoices().find(v => v.name === voiceName);
    utter.rate = speed;
    synth.speak(utter);
}

function toggleReveal() {
    if (!currentQ) return;
    const box = document.getElementById('hidden-q');
    isRevealed = !isRevealed;
    if (isRevealed) {
        box.innerText = currentQ;
        box.classList.add('reveal-active');
    } else {
        box.innerText = "题目已隐藏，请注意听...";
        box.classList.remove('reveal-active');
    }
}

// 初始化
window.onload = () => {
    if(synth.getVoices().length) loadVoices('global-voice');
};
</script>
</body>
</html>
