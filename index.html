<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医学生保研面试模拟器 - PandaMed</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --accent: #27ae60; --bg: #f4f7f6; --danger: #e74c3c; }
        body { font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--primary); line-height: 1.6; padding-bottom: 60px; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2.2rem; margin-bottom: 10px; color: var(--primary); }
        .subtitle { color: #7f8c8d; font-weight: 500; }

        /* 布局 */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 30px 20px; border-radius: 15px; box-shadow: 0 8px 15px rgba(0,0,0,0.05); cursor: pointer; transition: all 0.3s ease; border-top: 6px solid var(--secondary); text-align: center; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0,0,0,0.1); }
        .card h2 { margin: 0; font-size: 1.1rem; line-height: 1.4; }

        .main-actions { text-align: center; margin-bottom: 40px; }
        .btn-huge { padding: 15px 40px; font-size: 1.2rem; background: var(--accent); color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 5px 15px rgba(39,174,96,0.3); transition: 0.3s; }
        .btn-huge:hover { transform: scale(1.05); background: #219150; }

        /* 视图切换 */
        #question-view, #practice-view { display: none; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #f0f2f5; padding-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
        .btn-back { background: #ecf0f1; color: #7f8c8d; }
        .btn-random { background: var(--secondary); color: white; }

        /* 问题列表 */
        .q-item { padding: 15px; border-bottom: 1px solid #f1f1f1; display: flex; justify-content: space-between; align-items: center; }
        .q-text { font-size: 1rem; color: #34495e; padding-right: 15px; flex: 1; }
        .action-group { display: flex; gap: 8px; }
        .mini-btn { width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: 0.2s; }
        .play-btn { background: #e3f2fd; color: #1976d2; }
        .set-btn { background: #f5f5f5; color: #616161; }

        /* 练习模式 */
        .practice-container { text-align: center; max-width: 800px; margin: 0 auto; }
        #hidden-q { font-size: 1.5rem; min-height: 100px; display: flex; align-items: center; justify-content: center; margin: 25px 0; padding: 25px; border: 2px dashed #cbd5e0; border-radius: 12px; color: #a0aec0; background: #fafafa; }
        .control-panel { background: #f8f9fa; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; font-size: 0.85rem; }
        
        .disclaimer { text-align: center; color: #bdc3c7; font-size: 0.8rem; margin-top: 50px; border-top: 1px solid #eee; padding-top: 20px; }
        select, input[type="range"] { width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🩺 医学生保研面试模拟器</h1>
        <p class="subtitle">不发正刊不改名（全平台同名）原创</p>
    </header>

    <div id="home-view">
        <div class="main-actions">
            <button class="btn-huge" onclick="startRandom('all')">🎲 进入随机抽题模式</button>
        </div>
        <div class="grid" id="category-grid"></div>
    </div>

    <div id="question-view">
        <div class="nav-header">
            <button class="btn btn-back" onclick="goHome()">← 返回主页</button>
            <h2 id="cat-title" style="margin:0"></h2>
            <button class="btn btn-random" onclick="startRandom('current')">🎲 随机抽题模式</button>
        </div>
        <div id="q-list"></div>
    </div>

    <div id="practice-view">
        <button class="btn btn-back" onclick="goBackToLast()">← 返回</button>
        <div class="practice-container">
            <h2>听力模拟练习</h2>
            
            <div class="control-panel">
                <div>
                    <label>口音 (Voice):</label>
                    <select id="voice-select" onchange="saveSettings()"></select>
                </div>
                <div>
                    <label>语速 (Rate):</label>
                    <input type="range" id="rate-range" min="0.5" max="1.5" step="0.1" value="1" onchange="saveSettings()">
                </div>
            </div>
            
            <button onclick="pickRandom()" style="padding:15px 40px; font-size:1.2rem; background:var(--secondary); color:white; border:none; border-radius:50px; cursor:pointer; box-shadow: 0 5px 15px rgba(52,152,219,0.3)">点击随机播放题目</button>
            
            <div id="hidden-q">题目文本已隐藏，请注意听...</div>
            
            <div style="display:flex; gap:10px; justify-content:center; flex-wrap: wrap;">
                <button class="btn" onclick="toggleReveal()" style="background:#34495e; color:white;">显示/隐藏文字</button>
                <button class="btn" onclick="replay()" style="background:#95a5a6; color:white;">🔄 重播</button>
            </div>
        </div>
    </div>

    <footer class="disclaimer">
        免责声明：本工具是基于开源技术开发的练习工具，随配套文件赠送，仅供模拟练习
    </footer>
</div>

<script>
const data = [
    { title: "1. 自我介绍与周围环境", questions: [
        "Introduce yourself. What kind of person do you think you are? Describe yourself with three words.",
        "Introduce your family.",
        "Introduce your best friend.",
        "Introduce your hometown.",
        "Do you have a girl/boy friend? Are you in a relationship?",
        "Have you ever traveled to any place? Please introduce a tourist attraction / favorite city.",
        "What’s your hobby? What are your hobbies and interests? What do you like to do in your free time?",
        "What’s your favorite sport/athlete/movie/book?",
        "What are your strengths and weaknesses? What are your advantages and disadvantages?",
        "What is your English name and why did you choose it?",
        "How do your hobbies help you in your medical studies?"
    ]},
    { title: "2. 本科阶段经历", questions: [
        "Introduce your undergraduate school.",
        "Introduce the student club you joined in.",
        "What do you usually do on weekends? How do you spend your time at school on a daily basis?",
        "How do you balance your studies and research?",
        "What skills did you acquire in college?",
        "What's your favorite subject? Why?",
        "How many people are there in your major?",
        "How do you learn English? / What's your attitude towards learning English?",
        "Which course was the most difficult for you, and how did you pass it?",
        "If you could restart your undergraduate life, what would you do differently?",
        "Introduce your scientific experience. What competition/project did you participate in?",
        "What's the relationship between practice and science?",
        "What do you think is the most important quality for a medical post-graduate?",
        "What is the significance/innovation of your research project?",
        "Have you been to the laboratory? How long do you usually stay in the laboratory?",
        "How often do you read papers? How do you read papers?",
        "Which topic/area/field are you particularly interested in?",
        "Introduce the social practice project / volunteer experiences you have joined.",
        "Do you have any experience studying abroad?"
    ]},
    { title: "3. 选择动机和未来规划", questions: [
        "Why do you want to be a doctor? Why do you choose this major?",
        "Why do you choose the academic or professional degree?",
        "What are your long-term and short-term goals? / Talk about your plans for postgraduate studies."
    ]},
    { title: "4. 心理素质与人际关系", questions: [
        "How do you deal with negative emotions, like stress and anxiety / setbacks? How do you relieve stress?",
        "How do you handle the failure of an experiment?",
        "Talk about the most successful experience. What is your greatest achievement during undergraduate years?",
        "As the team leader, how do you manage the team?",
        "Tell me about your teamwork experience.",
        "How do your friends talk about you?",
        "If you have an argument with someone, how do you resolve it?",
        "Describe a situation where you had to work with a difficult teammate.",
        "Can you handle many tasks at the same time?",
        "Do you think you are an emotionally stable person?",
        "Do you prefer to work alone or together?"
    ] }
];

let currentCatIdx = -1;
let currentQText = null;
let mode = 'all'; // 'all' or 'current'
let isRevealed = false;
const synth = window.speechSynthesis;

// 初始化主页
function initHome() {
    const grid = document.getElementById('category-grid');
    grid.innerHTML = data.map((cat, idx) => `
        <div class="card" onclick="showCategory(${idx})">
            <h2>${cat.title}</h2>
        </div>
    `).join('');
}

function loadVoices() {
    const select = document.getElementById('voice-select');
    const voices = synth.getVoices().filter(v => v.lang.includes('en'));
    select.innerHTML = voices.map(v => `<option value="${v.name}">${v.name}</option>`).join('');
}

if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = loadVoices;
}

function showCategory(index) {
    currentCatIdx = index;
    document.getElementById('home-view').style.display = 'none';
    document.getElementById('question-view').style.display = 'block';
    document.getElementById('cat-title').innerText = data[index].title;
    
    const list = document.getElementById('q-list');
    list.innerHTML = data[index].questions.map(q => `
        <div class="q-item">
            <div class="q-text">${q}</div>
            <div class="action-group">
                <button class="mini-btn set-btn" onclick="startRandom('current')" title="设置语速口音">⚙️</button>
                <button class="mini-btn play-btn" onclick="speak('${q.replace(/'/g, "\\'")}')">▶️</button>
            </div>
        </div>
    `).join('');
}

function goHome() {
    document.getElementById('home-view').style.display = 'block';
    document.getElementById('question-view').style.display = 'none';
}

function startRandom(m) {
    mode = m;
    document.getElementById('home-view').style.display = 'none';
    document.getElementById('question-view').style.display = 'none';
    document.getElementById('practice-view').style.display = 'block';
    loadVoices();
    resetPractice();
}

function goBackToLast() {
    document.getElementById('practice-view').style.display = 'none';
    if (mode === 'current') {
        document.getElementById('question-view').style.display = 'block';
    } else {
        document.getElementById('home-view').style.display = 'block';
    }
}

function speak(text) {
    synth.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    const selectedVoice = document.getElementById('voice-select').value;
    utter.voice = synth.getVoices().find(v => v.name === selectedVoice);
    utter.rate = document.getElementById('rate-range').value;
    synth.speak(utter);
}

function resetPractice() {
    currentQText = null;
    isRevealed = false;
    document.getElementById('hidden-q').innerText = "请点击上方按钮抽题";
    document.getElementById('hidden-q').style.color = "#a0aec0";
}

function pickRandom() {
    let pool = [];
    if (mode === 'current') {
        pool = data[currentCatIdx].questions;
    } else {
        data.forEach(c => pool.push(...c.questions));
    }
    
    currentQText = pool[Math.floor(Math.random() * pool.length)];
    isRevealed = false;
    document.getElementById('hidden-q').innerText = "Question is playing... (Listening)";
    document.getElementById('hidden-q').style.color = "#a0aec0";
    speak(currentQText);
}

function toggleReveal() {
    if (!currentQText) return;
    const box = document.getElementById('hidden-q');
    if (!isRevealed) {
        box.innerText = currentQText;
        box.style.color = "var(--primary)";
        isRevealed = true;
    } else {
        box.innerText = "题目文本已隐藏，请注意听...";
        box.style.color = "#a0aec0";
        isRevealed = false;
    }
}

function replay() {
    if (currentQText) speak(currentQText);
}

window.onload = () => {
    initHome();
    loadVoices();
};
</script>
</body>
</html>
